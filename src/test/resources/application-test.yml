spring:
  datasource:
    url: jdbc:h2:mem:crm_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  security:
    jwt:
      secret: 9a4f2c8d3b7a1e5f8c6b4d2a1c0e9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1
      access-expiration: 900000
      refresh-expiration: 604800000

app:
  jwt:
    secret: 9a4f2c8d3b7a1e5f8c6b4d2a1c0e9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:5173
  rate-limiting:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
